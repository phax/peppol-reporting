peppol.reporting.jdbc.database-type = oracle
peppol.reporting.jdbc.driver = oracle.jdbc.OracleDriver
peppol.reporting.jdbc.url = jdbc:oracle:thin:@//localhost:1521/ORCLPDB1
peppol.reporting.jdbc.user = peppol
peppol.reporting.jdbc.password = peppol
# Leave the schema empty so that unqualified table names resolve in the
# connecting user's own schema. Oracle folds unquoted identifiers to upper
# case, so a quoted lower-case schema prefix would not match.
peppol.reporting.jdbc.schema =
peppol.reporting.jdbc.debug.connections = false
peppol.reporting.jdbc.debug.transactions = false
peppol.reporting.jdbc.debug.sql = false
peppol.reporting.flyway.enabled = true
