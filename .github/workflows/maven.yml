name: Maven build

on:
  push:
    
permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        java: [ 17, 21, 25 ]
    name: Java ${{ matrix.java }} build

    services:
      mysql:
        image: mysql:8
        env:
          # The MySQL docker container requires these environment variables to be set
          # so we can create and migrate the test database.
          # See: https://hub.docker.com/_/mysql
          MYSQL_DATABASE: peppol-db
          MYSQL_ROOT_PASSWORD: peppol
          # Additional properties for testing
          MYSQL_USER: peppol
          MYSQL_PASSWORD: peppol
        ports:
          # Opens port 3306 on service container and host
          # https://docs.github.com/en/actions/using-containerized-services/about-service-containers
          - 3306:3306
          # Before continuing, verify the mysql container is reachable from the ubuntu host
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

      sqlserver:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: "Y"
          MSSQL_SA_PASSWORD: "Peppol_Strong!Pass1"
        ports:
          - 1433:1433
        options: --health-cmd "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'Peppol_Strong!Pass1' -C -Q 'SELECT 1' || exit 1" --health-interval=10s --health-timeout=5s --health-retries=10 --health-start-period=10s

    steps:
    - name: Login to Docker Hub
      uses: docker/login-action@v4
      with:
        username: ${{ vars.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}      
      
    - uses: actions/checkout@v6
    
    - name: Set up JDK ${{ matrix.java }}
      uses: actions/setup-java@v5
      with:
        java-version: ${{ matrix.java }}
        distribution: 'temurin'
        server-id: central
        server-username: MAVEN_USERNAME
        server-password: MAVEN_PASSWORD

    - name: Cache local Maven repository
      uses: actions/cache@v5
      with:
        path: ~/.m2/repository
        key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
        restore-keys: |
          ${{ runner.os }}-maven-
 
    - name: Start MongoDB
      uses: supercharge/mongodb-github-action@1.10.0
      with:
        mongodb-version: '6.0'
  
    - name: Start PostgreSQL
      uses: ikalnytskyi/action-setup-postgres@v6
      with:
        username: peppol
        password: peppol
        database: peppol-db
        port: 5432
      id: postgres

    - name: Create SQL Server database
      run: docker exec $(docker ps -q --filter "ancestor=mcr.microsoft.com/mssql/server:2022-latest") /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'Peppol_Strong!Pass1' -C -Q "IF NOT EXISTS (SELECT name FROM sys.databases WHERE name = 'peppol-reporting') CREATE DATABASE [peppol-reporting];"

    - name: Build and deploy with Maven
      run: mvn --batch-mode --update-snapshots -P release-snapshot deploy
      if: github.event_name == 'push' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch) && matrix.java == 17
      env:
        MAVEN_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
        MAVEN_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}

    - name: Maven Build
      run: mvn --batch-mode --update-snapshots install
      if: github.event_name != 'push' || github.ref != format('refs/heads/{0}', github.event.repository.default_branch) || matrix.java != 17
